<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Darker green base for high contrast -->
  <rect width="512" height="512" rx="96" fill="#1f5634"/>

  <!-- Amber price-tag accent on handle (drawn first so cart sits over it) -->
  <g transform="rotate(-18 110 130)">
    <rect x="60" y="108" width="72" height="44" rx="8" fill="#fbbf24"/>
    <circle cx="74" cy="130" r="6" fill="#1f5634"/>
  </g>

  <!-- Cart handle: bold white stroke -->
  <path d="M 110 130 L 168 130 L 200 320 L 410 320"
        stroke="white" stroke-width="32" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cart basket -->
  <path d="M 180 175 L 432 175 L 410 290 L 200 290 Z"
        stroke="white" stroke-width="24" fill="none"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Wheels -->
  <circle cx="230" cy="385" r="30" fill="white"/>
  <circle cx="395" cy="385" r="30" fill="white"/>
  <circle cx="230" cy="385" r="12" fill="#1f5634"/>
  <circle cx="395" cy="385" r="12" fill="#1f5634"/>
</svg>
